<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monooka AI</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div class="app-container">
      
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <button type="button" class="menu-btn" id="menu-btn" aria-label="Toggle Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Menu Icon"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
          </button>
          <span class="logo-text">Monooka AI</span>
        </div>
        
        <div class="curriculum-container" id="curriculum-container">
          <!-- Accordion structure will be rendered here by JS -->
        </div>
        
        <div class="sidebar-footer">
          <button type="button" class="theme-toggle" id="theme-toggle">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Sun Icon"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <span class="theme-text">Toggle Theme</span>
          </button>
        </div>
      </aside>

      <!-- Main Chat Area -->
      <main class="main-content">
        
        <header class="mobile-header">
          <button type="button" class="mobile-menu-btn" id="mobile-menu-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Menu Icon"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
          </button>
          <h2>Monooka AI</h2>
        </header>

        <div class="chat-container" id="chat-container">
          <div class="welcome-screen" id="welcome-screen">
            <h1 class="welcome-title">Hello, Elina</h1>
            <p class="welcome-subtitle">How can I help you today?</p>
          </div>
          
          <div class="messages-list" id="messages-list">
            <!-- Messages will be appended here -->
          </div>
        </div>

        <!-- Input Area -->
        <div class="input-container-wrapper">
          <div class="input-container">
            <textarea 
              id="chat-input" 
              placeholder="Ask Monooka AI..." 
              rows="1"
            ></textarea>
            <div class="input-actions">
              <button type="button" class="icon-btn" aria-label="Upload image">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Image Icon"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
              </button>
              <button type="button" class="send-btn" id="send-btn" aria-label="Send message" disabled>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="Send Icon"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
              </button>
            </div>
          </div>
          <p class="disclaimer">Monooka AI may display inaccurate info, so double-check its responses.</p>
        </div>

      </main>

    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
