<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Evaluation Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Pure 90s Windows/Web Aesthetic */
            --bg-base: #c0c0c0;
            --panel-bg: #c0c0c0;
            --text-main: #000000;
            --text-muted: #000000;
            --accent-blue: #000080; /* Windows Titlebar Blue */
            --link-color: #0000ee;
            
            --border-light: #ffffff;
            --border-dark: #808080;
            --border-darker: #000000;
            
            --success-color: #008000;
            --warning-color: #808000;
            --error-color: #ff0000;
            
            --font-main: "Pixelify Sans", "MS Sans Serif", "Tahoma", "Arial", sans-serif;
            --font-serif: "Pixelify Sans", "Times New Roman", Times, serif;
            --font-mono: "Pixelify Sans", "Courier New", Courier, monospace;
            
            --outset-border: 2px solid var(--panel-bg);
            --outset-shadow: inset 1px 1px 0px var(--border-light), inset -1px -1px 0px var(--border-darker), inset -2px -2px 0px var(--border-dark);
            --inset-shadow: inset 1px 1px 0px var(--border-darker), inset 2px 2px 0px var(--border-dark), inset -1px -1px 0px var(--border-light);
        }

        body.dark-theme {
            /* 90s High Contrast / Hacker Terminal */
            --bg-base: #000000;
            --panel-bg: #000000;
            --text-main: #00ff00;
            --text-muted: #00aa00;
            --accent-blue: #00ff00;
            --link-color: #00ffff;
            
            --border-light: #00ff00;
            --border-dark: #008800;
            --border-darker: #004400;
            
            --success-color: #00ff00;
            --warning-color: #ffff00;
            --error-color: #ff0000;
            
            --outset-shadow: inset 1px 1px 0px var(--border-light), inset -1px -1px 0px var(--border-darker), inset -2px -2px 0px var(--border-dark);
            --inset-shadow: inset 1px 1px 0px var(--border-darker), inset 2px 2px 0px var(--border-dark), inset -1px -1px 0px var(--border-light);
        }

        body {
            font-family: var(--font-main);
            line-height: 1.4;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            background: var(--bg-base);
            /* Retro cursor */
            cursor: default;
        }

        a, button, .theme-toggle, .copy-btn {
            cursor: pointer;
        }

        /* 90s Window Panel */
        .window-panel {
            background: var(--panel-bg);
            border: var(--outset-border);
            box-shadow: var(--outset-shadow);
            margin-bottom: 20px;
            padding: 2px;
        }

        .title-bar {
            background: var(--accent-blue);
            color: #ffffff;
            padding: 4px 6px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            letter-spacing: 1px;
        }

        body.dark-theme .title-bar {
            background: var(--border-dark);
            color: #000000;
        }

        .title-bar-text {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-toggle {
            background: var(--panel-bg);
            border: var(--outset-border);
            box-shadow: var(--outset-shadow);
            height: 24px;
            font-size: 14px;
            font-weight: bold;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 8px;
            gap: 4px;
        }

        .theme-toggle:active {
            box-shadow: var(--inset-shadow);
            padding-top: 2px;
            padding-left: 2px;
        }

        /* Header contents */
        .header-content {
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-family: var(--font-serif);
            font-size: 2.5em;
            color: var(--text-main);
            text-decoration: underline;
        }

        .summary-stats {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }

        .stat-box {
            background: var(--panel-bg);
            padding: 15px 20px;
            min-width: 150px;
            text-align: center;
            border: var(--outset-border);
            box-shadow: var(--inset-shadow);
        }

        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: bold;
        }

        .stat-value {
            font-family: var(--font-serif);
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
            color: var(--text-main);
        }

        /* Table */
        .table-container {
            padding: 10px;
            background: var(--panel-bg);
        }

        .grid-table {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1.5fr 3.1fr 1.2fr 2fr;
            width: 100%;
            background: #ffffff;
            border: 2px solid var(--border-darker);
        }

        .grid-header-row, .grid-body, .grid-row {
            display: contents;
        }

        body.dark-theme .grid-table {
            background: #000000;
            border-color: var(--border-light);
        }

        .grid-header {
            background: var(--panel-bg);
            border: var(--outset-border);
            box-shadow: var(--outset-shadow);
            color: var(--text-main);
            text-align: left;
            padding: 10px;
            font-size: 13px;
            font-weight: bold;
            min-width: 0;
        }

        .grid-cell {
            padding: 15px 10px;
            vertical-align: top;
            font-size: 13px;
            border: 1px solid var(--border-dark);
            min-width: 0;
        }

        .grid-row:nth-child(even) .grid-cell {
            background-color: #f8f8f8;
        }
        
        body.dark-theme .grid-row:nth-child(even) .grid-cell {
            background-color: #050505;
        }

        .prompt-inputs { 
            font-family: var(--font-mono); 
            color: var(--link-color); 
            font-weight: bold;
        }
        
        .criteria { color: var(--text-main); font-family: var(--font-main); }
        .reasoning { 
            color: var(--text-muted); 
            font-family: var(--font-main); 
            font-size: 16px;
            line-height: 1.5;
            overflow-y: auto;
            max-height: 400px;
        }
        
        /* Apply 90s scrollbar to reasoning as well */
        .reasoning::-webkit-scrollbar {
            width: 16px;
        }
        .reasoning::-webkit-scrollbar-track {
            background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAIAAAACCAYAAABytg0kAAAAGXRFWHRTb2Z0d2FyZQBBZG9iZSBJbWFnZVJlYWR5ccllPAAAABZJREFUeNpi2rV7928GBgYQwgcsAAgwAAuJAjlF3C9BAAAAAElFTkSuQmCC');
            border-left: 1px solid var(--border-dark);
        }
        body.dark-theme .reasoning::-webkit-scrollbar-track {
            background: #002200;
        }
        .reasoning::-webkit-scrollbar-thumb {
            background-color: var(--panel-bg);
            border: var(--outset-border);
            box-shadow: var(--outset-shadow);
        }

        /* Score badges */
        .score {
            font-weight: bold;
            font-family: var(--font-mono);
            padding: 4px 8px;
            display: inline-block;
            font-size: 16px;
            background: #ffffff;
            border: 2px solid var(--border-darker);
        }
        
        body.dark-theme .score {
            background: #000000;
            border-color: var(--border-light);
        }

        .score-high { color: var(--success-color); }
        .score-medium { color: var(--warning-color); }
        .score-low { color: var(--error-color); }

        /* Multi-metric score breakdown */
        .score-breakdown {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 10px;
        }
        
        .metric {
            display: flex;
            flex-direction: column;
            gap: 2px;
            font-size: 11px;
            background: var(--panel-bg);
            padding: 6px;
            border: 1px solid var(--border-dark);
            font-family: var(--font-mono);
        }

        .metric-label {
            color: var(--text-muted);
            font-weight: bold;
            text-transform: uppercase;
            word-break: break-word;
        }

        .metric-value {
            font-weight: bold;
            color: var(--text-main);
        }

        /* Output text area */
        .output-container {
            position: relative;
            background-color: #ffffff;
            border: var(--outset-border);
            box-shadow: var(--inset-shadow);
            padding: 2px;
        }

        body.dark-theme .output-container {
            background-color: #000000;
        }

        .output pre {
            margin: 0;
            padding: 10px;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.2;
            color: var(--text-main);
            overflow-y: scroll;
            max-height: 400px;
            white-space: pre-wrap; 
            word-wrap: break-word; 
        }

        /* 90s Scrollbars */
        .output pre::-webkit-scrollbar {
            width: 16px;
            height: 16px;
        }
        .output pre::-webkit-scrollbar-track {
            background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAIAAAACCAYAAABytg0kAAAAGXRFWHRTb2Z0d2FyZQBBZG9iZSBJbWFnZVJlYWR5ccllPAAAABZJREFUeNpi2rV7928GBgYQwgcsAAgwAAuJAjlF3C9BAAAAAElFTkSuQmCC'); /* Checkered pattern */
            border-left: 1px solid var(--border-dark);
        }
        body.dark-theme .output pre::-webkit-scrollbar-track {
            background: #002200;
        }
        .output pre::-webkit-scrollbar-thumb {
            background-color: var(--panel-bg);
            border: var(--outset-border);
            box-shadow: var(--outset-shadow);
        }

        /* Copy Button */
        .copy-btn {
            position: absolute;
            top: 6px;
            right: 20px;
            background: #ffffff;
            border: var(--outset-border);
            box-shadow: var(--outset-shadow);
            padding: 4px 8px;
            font-family: var(--font-main);
            font-size: 18px; /* Increased icon size */
            font-weight: bold;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        body.dark-theme .copy-btn {
            background: #000000;
            filter: grayscale(100%) sepia(100%) hue-rotate(60deg) saturate(500%) brightness(1.2); /* Make it green */
        }

        .copy-btn:active {
            box-shadow: var(--inset-shadow);
            padding-top: 5px;
            padding-left: 9px;
            padding-right: 7px;
            padding-bottom: 3px;
        }

        .copy-popup {
            position: absolute;
            top: -22px;
            right: 0;
            background: var(--panel-bg);
            border: 1px solid var(--border-dark);
            box-shadow: var(--outset-shadow);
            color: var(--text-main);
            padding: 2px 6px;
            font-size: 11px;
            font-family: var(--font-main);
            font-weight: normal;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            white-space: nowrap;
        }
        .copy-popup.show {
            opacity: 1;
        }

    </style>
</head>
<body>

    <div class="window-panel">
        <div class="title-bar">
            <div class="title-bar-text">
                <span>🖥️</span> AILens_Evaluation_Report.exe
            </div>
            <button type="button" class="theme-toggle" id="themeToggle" title="Toggle Theme">◐</button>
        </div>
        
        <div class="header-content">
            <h1>Prompt Evaluation Report</h1>
            <div class="summary-stats">
                <div class="stat-box">
                    <div class="stat-label">Total Test Cases</div>
                    <div class="stat-value">__TOTAL_TESTS__</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Average Score</div>
                    <div class="stat-value">__AVG_SCORE__ / 40</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Pass Rate (&ge;30)</div>
                    <div class="stat-value">__PASS_RATE__%</div>
                </div>
            </div>
        </div>
    </div>

    <div class="window-panel">
        <div class="title-bar">
            <div class="title-bar-text">
                <span>📂</span> Results_Table.dat
            </div>
        </div>
        <div class="table-container">
            <div class="grid-table">
                <div class="grid-header-row">
                    <div class="grid-header">Scenario</div>
                    <div class="grid-header">Prompt Inputs</div>
                    <div class="grid-header">Solution Criteria</div>
                    <div class="grid-header">Output</div>
                    <div class="grid-header">Score</div>
                    <div class="grid-header">Reasoning</div>
                </div>
                <div class="grid-body">
                    __TABLE_ROWS__
                </div>
            </div>
        </div>
    </div>

    <script>
        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('themeToggle');
        
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-theme');
            themeToggleBtn.innerHTML = '<span>☼</span> Dark';
        } else {
            themeToggleBtn.innerHTML = '<span>◐</span> Light';
        }

        themeToggleBtn.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            themeToggleBtn.innerHTML = isDark ? '<span>☼</span> Dark' : '<span>◐</span> Light';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // Event delegation for dynamically added copy buttons
        document.addEventListener('click', (e) => {
            const button = e.target.closest('.copy-btn');
            if (button) {
                const outputDiv = button.nextElementSibling;
                if (outputDiv && outputDiv.classList.contains('output')) {
                    const preElement = outputDiv.querySelector('pre');
                    if (preElement) {
                        navigator.clipboard.writeText(preElement.innerText).then(() => {
                            const iconSpan = button.querySelector('.icon');
                            const popup = button.querySelector('.copy-popup');
                            
                            if (iconSpan) iconSpan.innerText = '💾';
                            if (popup) popup.classList.add('show');
                            
                            setTimeout(() => {
                                if (iconSpan) iconSpan.innerText = '📋';
                                if (popup) popup.classList.remove('show');
                            }, 2000);
                        });
                    }
                }
            }
        });</script>
</body>
</html>
