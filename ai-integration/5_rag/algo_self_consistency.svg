<svg viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>Self-consistency</title>
  <desc>Sample several chain-of-thought paths, collect their answers, and take the majority vote.</desc>
  <rect x="0" y="0" width="680" height="320" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <defs><marker id="sc" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker></defs>
  <text x="22" y="34" font-size="16" font-weight="700" fill="#0f172a">Self-consistency — sample many, vote</text>

  <rect x="22" y="130" width="90" height="44" rx="6" fill="#bae6fd" stroke="#0284c7"/>
  <text x="44" y="157" font-size="13" fill="#082f49">Question</text>

  <rect x="170" y="60" width="200" height="34" rx="6" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="184" y="82" font-size="11.5" fill="#052e16">reasoning path 1 -> A</text>
  <rect x="170" y="135" width="200" height="34" rx="6" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="184" y="157" font-size="11.5" fill="#052e16">reasoning path 2 -> A</text>
  <rect x="170" y="210" width="200" height="34" rx="6" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="184" y="232" font-size="11.5" fill="#052e16">reasoning path 3 -> B</text>

  <line x1="112" y1="145" x2="166" y2="77" stroke="#94a3b8" marker-end="url(#sc)"/>
  <line x1="112" y1="152" x2="166" y2="152" stroke="#94a3b8" marker-end="url(#sc)"/>
  <line x1="112" y1="160" x2="166" y2="227" stroke="#94a3b8" marker-end="url(#sc)"/>

  <rect x="420" y="120" width="120" height="64" rx="8" fill="#ffedd5" stroke="#ea580c"/>
  <text x="436" y="148" font-size="12.5" fill="#431407">majority vote</text>
  <text x="446" y="168" font-size="11" fill="#9a3412">A,A,B -> A</text>
  <line x1="370" y1="77" x2="418" y2="135" stroke="#94a3b8" marker-end="url(#sc)"/>
  <line x1="370" y1="152" x2="418" y2="152" stroke="#94a3b8" marker-end="url(#sc)"/>
  <line x1="370" y1="227" x2="418" y2="170" stroke="#94a3b8" marker-end="url(#sc)"/>

  <rect x="580" y="130" width="80" height="44" rx="6" fill="#bae6fd" stroke="#0284c7"/>
  <text x="604" y="157" font-size="13" font-weight="700" fill="#082f49">A</text>
  <line x1="540" y1="152" x2="578" y2="152" stroke="#94a3b8" marker-end="url(#sc)"/>

  <text x="22" y="288" font-size="12.5" fill="#334155">One path may slip; the <tspan font-weight="700">most frequent answer</tspan> across samples is usually right.</text>
</svg>
