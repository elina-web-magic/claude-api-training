<svg viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>Exact kNN vs Approximate NN</title>
  <desc>On the left, Exact kNN compares the query against all points; on the right, ANN hops along a shortcut graph and visits only a few nodes.</desc>

  <rect x="0" y="0" width="720" height="460" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>

  <line x1="360" y1="20" x2="360" y2="440" stroke="#cbd5e1" stroke-dasharray="4 4"/>

  <!-- LEFT: Exact kNN -->
  <text x="24" y="40" font-size="15" font-weight="700" fill="#0f172a">Exact kNN</text>
  <text x="24" y="60" font-size="12" fill="#475569">compares the query against ALL points</text>

  <g stroke="#cbd5e1" stroke-width="1">
    <line x1="80" y1="250" x2="150" y2="120"/>
    <line x1="80" y1="250" x2="210" y2="160"/>
    <line x1="80" y1="250" x2="270" y2="120"/>
    <line x1="80" y1="250" x2="300" y2="210"/>
    <line x1="80" y1="250" x2="250" y2="260"/>
    <line x1="80" y1="250" x2="300" y2="330"/>
    <line x1="80" y1="250" x2="130" y2="350"/>
    <line x1="80" y1="250" x2="220" y2="360"/>
    <line x1="80" y1="250" x2="180" y2="220"/>
  </g>
  <g fill="#3b82f6">
    <circle cx="150" cy="120" r="6"/><circle cx="210" cy="160" r="6"/>
    <circle cx="270" cy="120" r="6"/><circle cx="300" cy="210" r="6"/>
    <circle cx="250" cy="260" r="6"/><circle cx="300" cy="330" r="6"/>
    <circle cx="130" cy="350" r="6"/><circle cx="220" cy="360" r="6"/>
  </g>
  <circle cx="180" cy="220" r="8" fill="#16a34a" stroke="#052e16"/>
  <text x="192" y="224" font-size="11" fill="#166534">nearest</text>
  <path d="M 80 234 l 5 14 l 15 1 l -11 10 l 4 15 l -13 -8 l -13 8 l 4 -15 l -11 -10 l 15 -1 z" fill="#f59e0b" stroke="#b45309"/>
  <text x="34" y="270" font-size="11" font-weight="600" fill="#92400e">query</text>
  <text x="24" y="420" font-size="12" fill="#0f172a">9 points -> <tspan font-weight="700">9 comparisons</tspan>. Exact, but slow.</text>

  <!-- RIGHT: ANN (HNSW) -->
  <text x="384" y="40" font-size="15" font-weight="700" fill="#0f172a">Approximate NN (HNSW)</text>
  <text x="384" y="60" font-size="12" fill="#475569">hops along a shortcut graph</text>

  <g stroke="#e2e8f0" stroke-width="1">
    <line x1="470" y1="200" x2="540" y2="120"/>
    <line x1="470" y1="200" x2="490" y2="320"/>
    <line x1="600" y1="150" x2="660" y2="170"/>
    <line x1="490" y1="320" x2="580" y2="350"/>
  </g>
  <g fill="#cbd5e1">
    <circle cx="470" cy="200" r="6"/><circle cx="540" cy="120" r="6"/>
    <circle cx="600" cy="150" r="6"/><circle cx="660" cy="170" r="6"/>
    <circle cx="490" cy="320" r="6"/><circle cx="580" cy="350" r="6"/>
  </g>
  <g stroke="#ea580c" stroke-width="3">
    <line x1="420" y1="95" x2="525" y2="185"/>
    <line x1="525" y1="185" x2="600" y2="260"/>
    <line x1="600" y1="260" x2="635" y2="335"/>
  </g>
  <circle cx="420" cy="95" r="8" fill="#7c3aed" stroke="#1e1b4b"/>
  <text x="432" y="92" font-size="11" fill="#5b21b6">entry (top layer)</text>
  <circle cx="525" cy="185" r="7" fill="#ea580c" stroke="#431407"/>
  <circle cx="600" cy="260" r="7" fill="#ea580c" stroke="#431407"/>
  <circle cx="635" cy="335" r="9" fill="#16a34a" stroke="#052e16"/>
  <text x="500" y="360" font-size="11" fill="#166534">target (nearest)</text>
  <text x="384" y="420" font-size="12" fill="#0f172a">9 points -> <tspan font-weight="700">3 hops</tspan>. Almost exact, very fast.</text>
</svg>
