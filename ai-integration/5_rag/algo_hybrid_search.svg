<svg viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
  <title>Hybrid search with RRF fusion</title>
  <desc>BM25 ranked list and vector ranked list are fused by Reciprocal Rank Fusion into one final list.</desc>
  <rect x="0" y="0" width="680" height="360" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <defs><marker id="h1" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker></defs>
  <text x="22" y="34" font-size="16" font-weight="700" fill="#0f172a">Hybrid search — fuse lexical + semantic (RRF)</text>

  <rect x="280" y="50" width="120" height="34" rx="6" fill="#bae6fd" stroke="#0284c7"/>
  <text x="318" y="72" font-size="13" fill="#082f49">Query</text>

  <rect x="40" y="120" width="150" height="30" rx="5" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="62" y="140" font-size="12.5" fill="#052e16">BM25 (exact words)</text>
  <rect x="40" y="160" width="150" height="90" rx="6" fill="#ffedd5" stroke="#ea580c"/>
  <text x="52" y="180" font-size="11.5" fill="#431407">1. doc C</text>
  <text x="52" y="200" font-size="11.5" fill="#431407">2. doc A</text>
  <text x="52" y="220" font-size="11.5" fill="#431407">3. doc F</text>
  <text x="52" y="240" font-size="11.5" fill="#431407">…</text>

  <rect x="490" y="120" width="150" height="30" rx="5" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="505" y="140" font-size="12.5" fill="#052e16">Vector (meaning)</text>
  <rect x="490" y="160" width="150" height="90" rx="6" fill="#ffedd5" stroke="#ea580c"/>
  <text x="502" y="180" font-size="11.5" fill="#431407">1. doc A</text>
  <text x="502" y="200" font-size="11.5" fill="#431407">2. doc D</text>
  <text x="502" y="220" font-size="11.5" fill="#431407">3. doc C</text>
  <text x="502" y="240" font-size="11.5" fill="#431407">…</text>

  <line x1="318" y1="84" x2="150" y2="118" stroke="#94a3b8" marker-end="url(#h1)"/>
  <line x1="362" y1="84" x2="540" y2="118" stroke="#94a3b8" marker-end="url(#h1)"/>

  <path d="M275 280 h130 l-15 22 h-100 z" fill="#bbf7d0" stroke="#16a34a"/>
  <text x="300" y="295" font-size="12.5" font-weight="600" fill="#052e16">RRF fusion</text>
  <line x1="190" y1="250" x2="290" y2="280" stroke="#94a3b8" marker-end="url(#h1)"/>
  <line x1="490" y1="250" x2="392" y2="280" stroke="#94a3b8" marker-end="url(#h1)"/>

  <text x="240" y="335" font-size="12.5" fill="#0f172a">final: <tspan font-weight="700" fill="#16a34a">doc A</tspan> (high in both) -> doc C -> doc D …</text>
</svg>
